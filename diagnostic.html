<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCBUS 同步诊断工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .test-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-item h3 {
            color: #555;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .status.pending {
            background: #ffc107;
            color: #000;
        }
        .status.success {
            background: #28a745;
            color: #fff;
        }
        .status.error {
            background: #dc3545;
            color: #fff;
        }
        .status.running {
            background: #17a2b8;
            color: #fff;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .details {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
            color: #666;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        .error-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .error-box h4 {
            color: #856404;
            margin-bottom: 10px;
        }
        .error-box p {
            color: #856404;
            margin: 5px 0;
            font-size: 14px;
        }
        .solution {
            background: #d4edda;
            border: 1px solid #28a745;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .solution h4 {
            color: #155724;
            margin-bottom: 10px;
        }
        .solution p {
            color: #155724;
            margin: 5px 0;
            font-size: 14px;
        }
        code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        .progress {
            width: 100%;
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 NCBUS 同步诊断工具</h1>
        
        <div class="test-item">
            <h3>1. 服务器连接测试 <span id="test1-status" class="status pending">等待</span></h3>
            <div class="progress">
                <div class="progress-bar" id="test1-progress"></div>
            </div>
            <div id="test1-details" class="details" style="display:none;"></div>
        </div>
        
        <div class="test-item">
            <h3>2. 健康检查端点 <span id="test2-status" class="status pending">等待</span></h3>
            <div class="progress">
                <div class="progress-bar" id="test2-progress"></div>
            </div>
            <div id="test2-details" class="details" style="display:none;"></div>
        </div>
        
        <div class="test-item">
            <h3>3. 数据获取测试 <span id="test3-status" class="status pending">等待</span></h3>
            <div class="progress">
                <div class="progress-bar" id="test3-progress"></div>
            </div>
            <div id="test3-details" class="details" style="display:none;"></div>
        </div>
        
        <div class="test-item">
            <h3>4. 数据同步测试 <span id="test4-status" class="status pending">等待</span></h3>
            <div class="progress">
                <div class="progress-bar" id="test4-progress"></div>
            </div>
            <div id="test4-details" class="details" style="display:none;"></div>
        </div>

        <div id="error-section" style="display:none;"></div>
        <div id="solution-section" style="display:none;"></div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="runAllTests()">🚀 开始诊断</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 重新开始</button>
        </div>
    </div>

    <script>
        // 配置 - 根据实际情况修改
        const SERVER_URL = prompt('请输入服务器地址（如 http://localhost:3000）:', 'http://localhost:3000') || 'http://localhost:3000';
        
        // 更新状态显示
        function updateStatus(testId, status, message, details = '') {
            const statusEl = document.getElementById(`test${testId}-status`);
            const detailsEl = document.getElementById(`test${testId}-details`);
            const progressEl = document.getElementById(`test${testId}-progress`);
            
            statusEl.className = `status ${status}`;
            statusEl.textContent = {
                'pending': '等待',
                'running': '运行中',
                'success': '成功',
                'error': '失败'
            }[status];
            
            if (details) {
                detailsEl.style.display = 'block';
                detailsEl.textContent = details;
            }
            
            if (status === 'running') {
                progressEl.style.width = '50%';
            } else if (status === 'success') {
                progressEl.style.width = '100%';
            } else if (status === 'error') {
                progressEl.style.width = '100%';
            }
        }

        // 测试1: 服务器连接
        async function test1_Connection() {
            updateStatus(1, 'running');
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(SERVER_URL, {
                    method: 'GET',
                    signal: controller.signal
                });
                clearTimeout(timeout);
                
                updateStatus(1, 'success', `连接成功！\n状态码: ${response.status}\n状态文本: ${response.statusText}`);
                return true;
            } catch (error) {
                let errorMsg = `连接失败！\n错误: ${error.message}`;
                
                if (error.name === 'AbortError') {
                    errorMsg += '\n\n可能原因：服务器未启动或地址错误';
                } else if (error.message.includes('CORS')) {
                    errorMsg += '\n\n可能原因：跨域请求被阻止';
                } else if (error.message.includes('NetworkError')) {
                    errorMsg += '\n\n可能原因：网络错误或服务器不可达';
                }
                
                updateStatus(1, 'error', errorMsg);
                showError('服务器连接失败', errorMsg);
                return false;
            }
        }

        // 测试2: 健康检查
        async function test2_HealthCheck() {
            updateStatus(2, 'running');
            try {
                const response = await fetch(`${SERVER_URL}/health`, {
                    method: 'GET'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    updateStatus(2, 'success', `健康检查通过！\n服务器时间: ${data.time}\n状态: ${data.status}`);
                    return true;
                } else {
                    updateStatus(2, 'error', `健康检查失败\n状态码: ${response.status}`);
                    return false;
                }
            } catch (error) {
                updateStatus(2, 'error', `健康检查失败\n错误: ${error.message}`);
                return false;
            }
        }

        // 测试3: 数据获取
        async function test3_GetData() {
            updateStatus(3, 'running');
            try {
                const response = await fetch(`${SERVER_URL}/api/data`, {
                    method: 'GET'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const dataSize = JSON.stringify(data).length;
                    updateStatus(3, 'success', `数据获取成功！\n线路数量: ${data.lines?.length || 0}\n车辆数量: ${data.vehicles?.length || 0}\n车型数量: ${data.vehicleModels?.length || 0}\n数据大小: ${dataSize} 字节\n最后更新: ${data.lastUpdate || '未知'}`);
                    return true;
                } else {
                    updateStatus(3, 'error', `数据获取失败\n状态码: ${response.status}`);
                    return false;
                }
            } catch (error) {
                updateStatus(3, 'error', `数据获取失败\n错误: ${error.message}`);
                return false;
            }
        }

        // 测试4: 数据同步
        async function test4_Sync() {
            updateStatus(4, 'running');
            try {
                const testData = {
                    lines: [{
                        id: 'test_' + Date.now(),
                        name: '测试线路',
                        testTime: new Date().toISOString()
                    }],
                    vehicles: [],
                    vehicleModels: [],
                    lineImages: [],
                    trips: [],
                    lastSyncTime: new Date().toISOString()
                };
                
                const response = await fetch(`${SERVER_URL}/api/sync`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    updateStatus(4, 'success', `数据同步成功！\n服务器响应: ${JSON.stringify(result)}\n测试数据已保存`);
                    return true;
                } else {
                    const errorText = await response.text();
                    updateStatus(4, 'error', `数据同步失败\n状态码: ${response.status}\n错误: ${errorText}`);
                    return false;
                }
            } catch (error) {
                updateStatus(4, 'error', `数据同步失败\n错误: ${error.message}`);
                return false;
            }
        }

        // 显示错误信息
        function showError(title, message) {
            const errorSection = document.getElementById('error-section');
            errorSection.style.display = 'block';
            errorSection.innerHTML = `
                <div class="error-box">
                    <h4>❌ ${title}</h4>
                    <p>${message.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }

        // 显示解决方案
        function showSolution() {
            const solutionSection = document.getElementById('solution-section');
            solutionSection.style.display = 'block';
            solutionSection.innerHTML = `
                <div class="solution">
                    <h4>💡 解决方案</h4>
                    <p><strong>1. 启动服务器</strong></p>
                    <p>在项目目录打开终端，运行：</p>
                    <p><code>node server.js</code></p>
                    <br>
                    <p><strong>2. 检查端口占用</strong></p>
                    <p>如果端口3000被占用，可以修改 server.js 中的 PORT 值，或关闭占用程序。</p>
                    <br>
                    <p><strong>3. 检查防火墙</strong></p>
                    <p>确保防火墙允许 3000 端口的访问。</p>
                    <br>
                    <p><strong>4. 确认服务器地址</strong></p>
                    <p>在 V2.14.html 中检查 <code>LOCAL_SERVER_URL</code> 是否与服务器地址一致。</p>
                </div>
            `;
        }

        // 运行所有测试
        async function runAllTests() {
            const results = [];
            
            results.push(await test1_Connection());
            if (!results[0]) {
                showSolution();
                return;
            }
            
            results.push(await test2_HealthCheck());
            results.push(await test3_GetData());
            results.push(await test4_Sync());
            
            const successCount = results.filter(r => r).length;
            
            if (successCount === results.length) {
                showSolution();
                const solutionSection = document.getElementById('solution-section');
                solutionSection.innerHTML = `
                    <div class="solution">
                        <h4>✅ 所有测试通过！</h4>
                        <p>您的服务器配置正确，可以正常同步数据了。</p>
                        <p>现在可以打开 <code>V2.14.html</code> 使用云端同步功能。</p>
                    </div>
                `;
            }
        }

        // 页面加载时提示输入服务器地址
        window.onload = function() {
            if (!SERVER_URL) {
                alert('未输入服务器地址，将在5秒后使用默认地址 http://localhost:3000');
            }
        };
    </script>
</body>
</html>
